<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <rect width="640" height="640" fill="#f6f1e4"/>
  <g transform="translate(0 8)">
    <!-- Rifle target built from ring diameters (mm):
         1:45.5  2:40.5  3:35.5  4:30.5  5:25.5
         6:20.5  7:15.5  8:10.5  9:5.5  10-dot:0.5
         Outer 1-ring radius mapped to 280px. -->
    <g fill="none" stroke="#4a4a4a" stroke-width="2">
      <circle cx="320" cy="312" r="280"/>
      <circle cx="320" cy="312" r="249.23"/>
      <circle cx="320" cy="312" r="218.46"/>
      <circle cx="320" cy="312" r="187.69"/>
    </g>

    <!-- Black aiming mark reaches the 4-ring boundary -->
    <circle cx="320" cy="312" r="187.69" fill="#1f261f"/>

    <g fill="none" stroke="#f6f1e4" stroke-width="2">
      <circle cx="320" cy="312" r="156.92"/>
      <circle cx="320" cy="312" r="126.15"/>
      <circle cx="320" cy="312" r="95.38"/>
      <circle cx="320" cy="312" r="64.62"/>
      <circle cx="320" cy="312" r="33.85"/>
    </g>

    <!-- 10-ring center dot: 0.5mm diameter -->
    <circle cx="320" cy="312" r="3.08" fill="#f6f1e4"/>

    <g fill="#575757" font-family="Arial, Helvetica, sans-serif" font-size="16">
      <text x="523" y="18">Date</text>
    </g>
    <line x1="562" y1="13" x2="624" y2="13" stroke="#575757" stroke-width="1.5"/>
  </g>
</svg>
